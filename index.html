<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Science Explorer</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        #chat-box { border: 1px solid #ccc; padding: 20px; height: 300px; overflow-y: scroll; margin-bottom: 10px; border-radius: 8px; }
        input { width: 70%; padding: 10px; }
    </style>
</head>
<body>
    <h2>Physics & Science AI Assistant</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="Ask about physics...">
    <button id="sendBtn">Send</button>

    <script>
    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const userText = input.value;
        if (!userText) return; // Prevent empty sends
        
        chatBox.innerHTML += `<p><b>You:</b> ${userText}</p>`;
        input.value = ''; // Clear input
        chatBox.innerHTML += `<p><i>AI is thinking...</i></p>`;

        try {
            const response = await fetch('/api/chat', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: userText })
            });

            const data = await response.json();
            // Remove "AI is thinking..." and show response
            chatBox.lastElementChild.remove();
            chatBox.innerHTML += `<p><b>AI:</b> ${data.reply}</p>`;
        } catch (error) {
            chatBox.innerHTML += `<p style="color:red;">Error reaching server.</p>`;
        }
    };
</script>

</body>
</html>
